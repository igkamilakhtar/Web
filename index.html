<!DOCTYPE html>
<html>
<head>
    <title>Nexus Browser - Unrestricted</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Dark Theme Toolbar */
        .toolbar {
            background: #16213e;
            padding: 12px 20px;
            display: flex;
            gap: 12px;
            align-items: center;
            border-bottom: 1px solid #0f3460;
            flex-wrap: wrap;
        }

        .nav-group {
            display: flex;
            gap: 6px;
            background: #0f3460;
            padding: 4px;
            border-radius: 30px;
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: #e94560;
            font-size: 18px;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .nav-btn:hover {
            background: rgba(233,69,96,0.2);
            color: #fff;
        }

        .url-container {
            flex: 1;
            display: flex;
            align-items: center;
            background: #0f3460;
            border-radius: 30px;
            padding: 4px 16px;
            border: 1px solid #e94560;
        }

        .url-icon {
            color: #e94560;
            font-size: 16px;
            margin-right: 10px;
        }

        #urlBar {
            flex: 1;
            padding: 10px 0;
            border: none;
            background: transparent;
            font-size: 14px;
            color: white;
            outline: none;
        }

        #urlBar::placeholder {
            color: #8899aa;
        }

        .security-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #e94560;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 12px;
            color: white;
            font-weight: 500;
        }

        .action-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .action-btn {
            background: transparent;
            border: none;
            color: #e94560;
            font-size: 18px;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: rgba(233,69,96,0.2);
            color: white;
        }

        #goBtn {
            background: #e94560;
            color: white;
            border-radius: 25px;
            padding: 0 22px;
            width: auto;
        }

        #goBtn:hover {
            background: #c42e4a;
        }

        .status-bar {
            background: #0f3460;
            padding: 6px 20px;
            font-size: 12px;
            color: #8899aa;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .browser-container {
            flex: 1;
            position: relative;
            background: white;
        }

        /* 🔥 IMPORTANT: This iframe will load ANY website */
        #browserFrame {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(26,26,46,0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .loader-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #0f3460;
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .toolbar { padding: 8px 12px; }
            .security-badge span { display: none; }
            #goBtn span { display: none; }
        }
    </style>
</head>
<body>

<div class="toolbar">
    <div class="nav-group">
        <button class="nav-btn" onclick="goBack()" title="Back"><i class="fas fa-arrow-left"></i></button>
        <button class="nav-btn" onclick="goForward()" title="Forward"><i class="fas fa-arrow-right"></i></button>
        <button class="nav-btn" onclick="reloadPage()" title="Reload"><i class="fas fa-sync-alt"></i></button>
    </div>

    <div class="url-container">
        <i class="fas fa-globe url-icon"></i>
        <input type="text" id="urlBar" placeholder="Enter any website URL...">
    </div>

    <div class="security-badge">
        <i class="fas fa-shield-alt"></i>
        <span>UNRESTRICTED MODE</span>
    </div>

    <div class="action-group">
        <button class="action-btn" onclick="openHome()" title="Home"><i class="fas fa-home"></i></button>
        <button id="goBtn" class="action-btn" onclick="navigate()"><i class="fas fa-arrow-right"></i> <span>GO</span></button>
    </div>
</div>

<div class="status-bar">
    <span id="statusText">✅ Ready - All websites allowed</span>
    <span id="urlStatus">No restrictions mode active</span>
</div>

<div class="browser-container">
    <iframe id="browserFrame" src="https://www.google.com"></iframe>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loader-spinner"></div>
    </div>
</div>

<script>
    const iframe = document.getElementById('browserFrame');
    const urlBar = document.getElementById('urlBar');
    const statusSpan = document.getElementById('statusText');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const urlStatus = document.getElementById('urlStatus');
    
    let currentURL = 'https://www.google.com';
    let historyStack = [currentURL];
    let historyIndex = 0;
    
    function showLoading(show) {
        loadingOverlay.style.display = show ? 'flex' : 'none';
    }
    
    function navigate() {
        let url = urlBar.value.trim();
        
        if (!url) return;
        
        // Auto-add https://
        if (!url.startsWith('http://') && !url.startsWith('https://')) {
            if (url.includes('.')) {
                url = 'https://' + url;
            } else {
                url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
            }
        }
        
        currentURL = url;
        urlBar.value = url;
        urlStatus.innerHTML = url;
        showLoading(true);
        
        // 🔥 DIRECT iframe load - no restrictions!
        iframe.src = url;
        
        // Add to history
        if (historyStack[historyIndex] !== url) {
            historyStack = historyStack.slice(0, historyIndex + 1);
            historyStack.push(url);
            historyIndex++;
        }
        
        // Timeout hide loading
        setTimeout(() => showLoading(false), 3000);
    }
    
    function goBack() {
        if (historyIndex > 0) {
            historyIndex--;
            currentURL = historyStack[historyIndex];
            iframe.src = currentURL;
            urlBar.value = currentURL;
            urlStatus.innerHTML = currentURL;
            showLoading(true);
            setTimeout(() => showLoading(false), 3000);
        }
    }
    
    function goForward() {
        if (historyIndex < historyStack.length - 1) {
            historyIndex++;
            currentURL = historyStack[historyIndex];
            iframe.src = currentURL;
            urlBar.value = currentURL;
            urlStatus.innerHTML = currentURL;
            showLoading(true);
            setTimeout(() => showLoading(false), 3000);
        }
    }
    
    function reloadPage() {
        iframe.src = currentURL;
        showLoading(true);
        setTimeout(() => showLoading(false), 3000);
    }
    
    function openHome() {
        navigate('https://www.google.com');
    }
    
    // Enter key
    urlBar.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') navigate();
    });
    
    // Iframe events
    iframe.onload = () => {
        showLoading(false);
        statusSpan.innerHTML = '✅ Page loaded successfully';
        
        // Try to get current URL (may not work for cross-origin)
        try {
            let frameUrl = iframe.contentWindow.location.href;
            if (frameUrl && frameUrl !== 'about:blank') {
                currentURL = frameUrl;
                urlBar.value = frameUrl;
                urlStatus.innerHTML = frameUrl;
            }
        } catch(e) {
            // Cross-origin - can't access URL, that's fine
            console.log('Cross-origin site loaded');
        }
    };
    
    iframe.onerror = () => {
        showLoading(false);
        statusSpan.innerHTML = '⚠️ Error loading site - but trying anyway!';
    };
    
    // 🔥 OVERRIDE all security warnings
    window.addEventListener('securitypolicyviolation', (e) => {
        console.log('Security blocked:', e);
        e.preventDefault();
        return false;
    });
    
    console.log('🚀 UNRESTRICTED BROWSER READY!');
    console.log('✅ All websites will load');
    console.log('🔥 No security restrictions');
    
    // Initial load
    navigate('https://www.google.com');
</script>
</body>
</html>
